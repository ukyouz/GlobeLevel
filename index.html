<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
	<meta name="viewport" content="width=device-width"/>
	<title>Globe Level 制地等級/制地レベル</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
    <link rel="stylesheet" href="app.css"/>
</head>
<body>
<svg>
</svg>
<nav class="nav-group">
	<a href="/" class="link" title="Github Repo"><i class="fa-brands fa-github"></i></a>
	<a href="/project/globe-level" class="link" title="Project Note" i18n="about"></a>
</nav>
<div class="form" id="form">
    <div class="title">
        <span>@<span class="lang place-name">地點</span></span>
        <div class="icon-group">
            <a class="fa fa-search icon search" href="#" title target="_blank"></a>
            <span class="fa fa-times icon close" id="close"></span>
        </div>
    </div>
    <div class="spots"></div>
</div>
<div class="share">
    <select name="lang" id="lang" onchange="translateUI(this.value)">
        <option value="native">Native</option>
        <option value="en" selected>English</option>
        <option value="tw">繁體中文</option>
        <option value="ja">日本語</option>
    </select>
    <div class="btn" onclick="setAuthor();" i18n="set-name"></div>
    <a class="btn" target="_blank" id="saveAsImage" onclick="saveAsImage(this)" download="globe.png"><i class="fa-solid fa-camera"></i> <span i18n="screenshot"></span></a>
    <a class="btn" id="clearLevels" onclick="clearLevels()" title="Clear Levels"><i class="fa-solid fa-eraser"></i></a>
    <div class="config">
        <select id="proj-select" class="btn" onchange="switchProjection(this.value)" title="select a projection">
            <option value="0" i18n="projection.orthographic"></option>
            <option value="1" i18n="projection.natural-earth"></option>
            <option value="2" i18n="projection.equirectangular"></option>
            <option value="3" i18n="projection.mercator"></option>
            <option value="4" i18n="projection.stereographic"></option>
        </select>
        <select id="snap-select" class="btn">
            <option value="0" i18n="rotate-snap.free-rotate"></option>
            <option value="15" i18n="rotate-snap.15-deg"></option>
            <option value="30" i18n="rotate-snap.30-deg"></option>
        </select>
        <label for="showLabel" class="btn"><input type="checkbox" id="showLabel" checked onchange="toggleLabel(this.checked)"/><span i18n="show-labels"></span></label>
    </div>
</div>
<script src="https://d3js.org/d3.v4.min.js"></script>
<script src="https://unpkg.com/versor"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<script src="canvg.js"></script>
<script src="test/js/word_wrap.js"></script>
<script src="test/js/versor.min.js"></script>
<script src="app.js"></script>
</body>
</html>
