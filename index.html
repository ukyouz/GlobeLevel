<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
	<meta name="viewport" content="width=device-width"/>
	<title>World Level 世界等級/世界レベル</title>
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" type="text/css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
            height: 100%;
        }

        .nav-group {
            position: absolute;
            overflow: hidden;
            top: 0.75em;
            left: 1em;
            /*border: 1.5px solid #354255;*/
            /*border-radius: 4px;*/
            /*transition: border-color .2s;*/
            font-family: 'Ubuntu Condensed', sans-serif;
            background: #fff;
            border: 2px solid black;
            border-radius: 3px;
        }
        .nav-group:hover {
         border-color: black;
        }
        .nav-group .link {
            /*background: white;*/
            position: relative;
            display: block;
            float: left;
            padding: 6px 1em;
            text-decoration: none;
            color: black;
            overflow: visible;
            transition: color .2s;
        }
        .nav-group .link:hover {
            color: #1d5bb8;
        }
        .nav-group .link::after {
            content: "";
            display: block;
            background: black;
            width: 1px;
            position: absolute;
            top: 0;
            bottom: 0;
            right: 0;
            z-index: 9;
            -webkit-transform: rotate(15deg);
                -moz-transform: rotate(15deg);
                -ms-transform: rotate(15deg);
                    transform: rotate(15deg);
        }
        .nav-group .link:last-child::after {
            display: none;
        }
        .nav-group .link span {
          margin-left: 6px;
        }
        @media screen and (max-width: 767px) {
            .nav-group {
                font-size: .75em;
                border-width: 1px;
            }
            .nav-group .link::after {
                width: 1px;
            }
        }
        svg {
            /*outline: 1px solid red;*/
            /*width: 100vw;*/
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;

            /*min-width: 320px;*/
            /*min-height: 320px;*/
            cursor: move; /* fallback if grab cursor is unsupported */
            cursor: grab;
            cursor: -moz-grab;
            cursor: -webkit-grab;

            user-select: none;
        }
        svg.dragging {
            cursor: grabbing;
            cursor: -moz-grabbing;
            cursor: -webkit-grabbing;
        }
        svg text {
            font-family: sans-serif;
        }
        svg text.place,
        svg path[id] {
            cursor: pointer;
        }

        .form {
        background: #fff;
        border: 1px solid #aaa;
        border-radius: 6px;
        max-width: 300px;
        position: fixed;
        top: 100;
        overflow: hidden;
        -webkit-transition: opacity 0.3s;
        transition: opacity 0.3s;
        display: none;
        user-select: none;
        }
        .form.show {
        opacity: 1;
        z-index: 99;
        }
        .form .title {
            display: flex;
            background: #efefef;
            padding: 4px 0.5em 4px 1em;
            align-items: center;
            justify-content: space-between;
        }
        [lang="en"] .form .title {
        padding-right: 70px;
        }
        .form .title .lang {
        font-weight: 600;
        margin-left: 2px;
        }
        .form .title .icon-group {
            margin-left: 12px;
            white-space: nowrap;
        }
        .form .title .icon-group .icon {
            line-height: 1;
            padding: 3px;
            color: #bbb;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
            transition: color 0.3s;
        }
        .form .title .icon-group .icon.search:hover {
        color: #3e6ffe;
        }
        .form .title .icon-group .icon.close:hover {
        color: #666;
        }
        .form .label {
        font-weight: normal;
        padding: 4px 1em;
        cursor: pointer;
        display: block;
        -webkit-transition: background 0.2s;
        transition: background 0.2s;
        }
        .form .label:hover, .form .label.selected {
        background: #eaeaea;
        }
        .form .label.red:hover, .form .label.red.selected {
        background: #e84c3d;
        }
        .form .label.orange:hover, .form .label.orange.selected {
        background: #d58337;
        }
        .form .label.green:hover, .form .label.green.selected {
        background: #30cc70;
        }
        .form .label.yellow:hover, .form .label.yellow.selected {
        background: #f3c218;
        }
        .form .label.blue:hover, .form .label.blue.selected {
        background: #3598db;
        }
        .share {
            position: absolute;
            bottom: 1em;
            right: 1em;
            text-align: right;
            user-select: none;
        }
        .config {
            bottom: calc(1em + 29px + 0.5em);
        }
        .config .btn,
        .share .btn {
            background: #fff;
            border: 1px solid #aaa;
            border-radius: 4px;
            padding: 0px 10px;
            margin: 6px 0 0;
            color: black;
            cursor: pointer;
            display: inline-block;
            line-height: 27px;
            font-size: 0.75em;
            text-decoration: none;
            vertical-align: bottom;
        }
        .config select,
        .share select {
            height: 29px;
        }

    </style>
</head>
<body>
<svg>
</svg>
<nav class="nav-group">
	<a href="/" class="link" title="ZHUNG"><i class="fa fa-th"></i><span>Home</span></a>
	<a href="/project/japanex" class="link" title="Project Note">About World Level Map</a>
</nav>
<div class="form" id="form">
    <div class="title">
        <span>@<span class="lang place-name">地點</span></span>
        <div class="icon-group">
            <a class="fa fa-search icon search" href="#" title target="_blank"></a>
            <span class="fa fa-times icon close" id="close"></span>
        </div>
    </div>
    <div class="spots"></div>
    <!-- <label v-for="level in d.form" class="label lang level" :id="current_city+'-'+level.level" :class="level.color" :data-value="level.level" v-text="level.description"/></label> -->
</div>
<div class="share">
    <div class="btn" onclick="setAuthor();">Set Name</div>
    <a class="btn" target="_blank" id="saveAsImage" onclick="saveAsImage(this)" download="japanex.png">Download</a>
    <div class="config">
        <select id="proj-select" class="btn" onchange="switchProjection(this.value)">
            <option value="0">Orthographic</option>
            <option value="1">Natural Earth</option>
            <option value="2">Equirectangular</option>
            <option value="3">Mercator</option>
            <option value="4">Stereographic</option>
        </select>
        <select id="snap-select" class="btn">
            <option value="0">Free Rotate</option>
            <option value="15">15 deg</option>
            <option value="30">30 deg</option>
        </select>
        <label for="showLabel" class="btn"><input type="checkbox" id="showLabel" checked onchange="toggleLabel(this.checked)"/>Show Label</label>
    </div>
</div>

<!-- <canvas width="960" height="500"></canvas> -->
<script src="https://d3js.org/d3.v4.min.js"></script>
<!-- <script src="https://unpkg.com/versor"></script> -->
<!-- <script src="https://unpkg.com/d3-inertia"></script> -->
<script src="https://unpkg.com/topojson-client@3"></script>
<script src="canvg.js"></script>
<script src="test/js/word_wrap.js"></script>
<script src="test/js/versor.min.js"></script>
<script src="app.js"></script>
</body>
</html>
